<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TEKA MarketMind AI</title>

<link rel="stylesheet" href="/static/css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<nav class="navbar">

<div class="logo">

🚀 TEKA

</div>

<div class="menu">

<a href="/">Dashboard</a>

<a href="/search?coin=bitcoin">Search</a>

<a href="/chart">Chart</a>

<a href="/watchlist">Watchlist</a>

</div>

</nav>

<div class="hero">

    <div class="stats-bar">

<div class="stat">
🌍 Coins
<h2>{{ coins|length }}</h2>
</div>

<div class="stat">
⚡ Market
<h2>{{ market_health }}</h2>
</div>

<div class="stat">
🕒 Updated
<h2>{{ time }}</h2>
</div>

<div class="stat">
🚀 Version
<h2>v{{ version }}</h2>
</div>

</div>

<h1>

TEKA MarketMind AI

</h1>

<p>

Professional Crypto Dashboard powered by AI

</p>

</div>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>

</html>
