<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<title>TEKA MarketMind</title>

<link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

<h1 class="title">🚀 TEKA MarketMind</h1>

<div class="card">

{% for coin in coins %}

<div class="row">

<div>
<b>{{ coin.symbol }}</b>
<br>
{{ coin.name }}
</div>

<div>

<div class="price">
${{ coin.price }}
</div>

{% if coin.change >= 0 %}
<div style="color:#00ff99">
▲ {{ coin.change }}%
</div>
{% else %}
<div style="color:#ff4d4d">
▼ {{ coin.change }}%
</div>
{% endif %}

</div>

</div>

{% endfor %}

<div class="footer">

آخرین بروزرسانی:
{{ time }}

<br><br>

Powered by TEKA AI 🚀

</div>

</body>

</html>
